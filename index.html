<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduTrack - Connexion</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0d7377;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            display: flex;
            min-height: 100vh;
        }

        /* Left Side - Brain Animation */
        .left-side {
            flex: 1;
            background: linear-gradient(135deg, #0d7377 0%, #14919b 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .brain-wrapper {
            position: relative;
            width: 450px;
            height: 450px;
        }

        /* Graduation Cap */
        .graduation-cap {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            animation: float 3s ease-in-out infinite;
        }

        .cap-top {
            width: 140px;
            height: 50px;
            background: linear-gradient(135deg, #2c3e50, #34495e);
            transform: perspective(200px) rotateX(60deg);
            border-radius: 10px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            position: relative;
        }

        .cap-top::after {
            content: '';
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 8px;
            height: 20px;
            background: #f1c40f;
        }

        .cap-base {
            width: 90px;
            height: 60px;
            background: linear-gradient(135deg, #34495e, #2c3e50);
            margin: -25px auto 0;
            border-radius: 0 0 45px 45px;
        }

        .tassel {
            width: 5px;
            height: 70px;
            background: linear-gradient(to bottom, #f1c40f, #f39c12);
            margin: -70px 75px 0;
            position: relative;
            animation: swing 2s ease-in-out infinite;
            transform-origin: top center;
        }

        .tassel::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 50%;
            transform: translateX(-50%);
            width: 18px;
            height: 18px;
            background: #f1c40f;
            border-radius: 50%;
        }

        /* Brain */
        .brain {
            width: 320px;
            height: 300px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 
                0 0 80px rgba(102, 126, 234, 0.6),
                inset 0 0 80px rgba(255,255,255,0.1);
            animation: pulse 2s ease-in-out infinite;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .brain::before {
            content: '🧠';
            font-size: 200px;
            opacity: 0.3;
        }

        .brain-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(102, 126, 234, 0.8) 0%, transparent 70%);
            border-radius: inherit;
            animation: glow 3s ease-in-out infinite;
        }

        /* Icons on Brain */
        .brain-icons {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
        }

        .brain-icon {
            position: absolute;
            width: 55px;
            height: 55px;
            background: linear-gradient(135deg, #00d2ff, #3a7bd5);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            box-shadow: 0 0 25px rgba(0, 210, 255, 0.6);
            animation: iconFloat 4s ease-in-out infinite;
        }

        .brain-icon:nth-child(1) { top: 15%; left: 15%; animation-delay: 0s; }
        .brain-icon:nth-child(2) { top: 10%; right: 15%; animation-delay: 0.5s; }
        .brain-icon:nth-child(3) { bottom: 25%; left: 10%; animation-delay: 1s; }
        .brain-icon:nth-child(4) { bottom: 20%; right: 20%; animation-delay: 1.5s; }
        .brain-icon:nth-child(5) { top: 50%; left: 50%; transform: translate(-50%, -50%); animation-delay: 2s; }

        /* Data Streams */
        .data-streams {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        .stream {
            position: absolute;
            height: 4px;
            background: linear-gradient(90deg, transparent, #00d2ff, #3a7bd5, transparent);
            animation: streamFlow 3s linear infinite;
            opacity: 0.7;
            border-radius: 2px;
        }

        .stream:nth-child(1) {
            top: 25%;
            width: 200px;
            animation-delay: 0s;
            background: linear-gradient(90deg, transparent, #00ffff, #00d2ff, transparent);
        }

        .stream:nth-child(2) {
            top: 45%;
            width: 250px;
            animation-delay: 1s;
            background: linear-gradient(90deg, transparent, #ff00ff, #9932cc, transparent);
        }

        .stream:nth-child(3) {
            top: 65%;
            width: 180px;
            animation-delay: 2s;
            background: linear-gradient(90deg, transparent, #ff6b6b, #ee5a6f, transparent);
        }

        /* Right Side - Form */
        .right-side {
            flex: 1;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .login-card {
            background: white;
            padding: 50px;
            border-radius: 25px;
            box-shadow: 0 25px 70px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 550px;
            animation: slideIn 0.8s ease-out;
        }

        .logo {
            font-size: 2.8rem;
            font-weight: 700;
            color: #1a1a2e;
            text-align: center;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 40px;
            font-size: 0.95rem;
        }

        /* Role Cards */
        .role-selector {
            margin-bottom: 30px;
        }

        .role-card {
            display: flex;
            align-items: center;
            padding: 22px;
            margin-bottom: 15px;
            background: #f8f9fa;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .role-card:hover {
            transform: translateX(10px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }

        .role-card.active {
            background: linear-gradient(135deg, #0d7377 0%, #14919b 100%);
            color: white;
            border-color: #667eea;
        }

        .role-icon {
            width: 55px;
            height: 55px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 20px;
            font-size: 24px;
            color: white;
            flex-shrink: 0;
        }

        .role-card.active .role-icon {
            background: white;
            color: #0d7377;
        }

        .role-info h3 {
            font-size: 1.2rem;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .role-info p {
            font-size: 0.85rem;
            opacity: 0.8;
        }

        /* Form */
        .login-form {
            margin-top: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group input {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-group input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(102, 126, 234, 0.4);
        }

        /* Animations */
        @keyframes float {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-20px); }
        }

        @keyframes swing {
            0%, 100% { transform: rotate(-5deg); }
            50% { transform: rotate(5deg); }
        }

        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.05); }
        }

        @keyframes glow {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 0.8; }
        }

        @keyframes iconFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes streamFlow {
            0% { transform: translateX(-150px); opacity: 0; }
            50% { opacity: 0.7; }
            100% { transform: translateX(500px); opacity: 0; }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* Responsive */
        @media (max-width: 968px) {
            .left-side {
                display: none;
            }
            
            .right-side {
                padding: 20px;
            }
            
            .login-card {
                padding: 30px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Left Side -->
        <div class="left-side">
            <div class="brain-wrapper">
                <div class="graduation-cap">
                    <div class="cap-top"></div>
                    <div class="cap-base"></div>
                    <div class="tassel"></div>
                </div>
                
                <div class="brain">
                    <div class="brain-glow"></div>
                    <div class="brain-icons">
                        <div class="brain-icon"><i class="fas fa-shield-alt"></i></div>
                        <div class="brain-icon"><i class="fas fa-graduation-cap"></i></div>
                        <div class="brain-icon"><i class="fas fa-user"></i></div>
                        <div class="brain-icon"><i class="fas fa-chart-line"></i></div>
                        <div class="brain-icon"><i class="fas fa-brain"></i></div>
                    </div>
                </div>
                
                <div class="data-streams">
                    <div class="stream"></div>
                    <div class="stream"></div>
                    <div class="stream"></div>
                </div>
            </div>
        </div>

        <!-- Right Side -->
        <div class="right-side">
            <div class="login-card">
                <h1 class="logo">EduTrack</h1>
                <p class="subtitle">Connexion sécurisée multi-rôles</p>
                
                <div class="role-selector">
                    <div class="role-card active" onclick="selectRole(this)">
                        <div class="role-icon">
                            <i class="fas fa-shield-alt"></i>
                        </div>
                        <div class="role-info">
                            <h3>Administrateur</h3>
                            <p>Pilotage global du centre</p>
                        </div>
                    </div>

                    <div class="role-card" onclick="selectRole(this)">
                        <div class="role-icon">
                            <i class="fas fa-graduation-cap"></i>
                        </div>
                        <div class="role-info">
                            <h3>Enseignant</h3>
                            <p>Suivi pédagogique intelligent</p>
                        </div>
                    </div>

                    <div class="role-card" onclick="selectRole(this)">
                        <div class="role-icon">
                            <i class="fas fa-user"></i>
                        </div>
                        <div class="role-info">
                            <h3>Parents</h3>
                            <p>Vision claire de la progression</p>
                        </div>
                    </div>
                </div>

                <form class="login-form" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <input type="email" placeholder="Email" required>
                    </div>
                    <div class="form-group">
                        <input type="password" placeholder="Mot de passe" required>
                    </div>
                    <button type="submit" class="btn-login">
                        <span>Se connecter</span>
                        <i class="fas fa-arrow-right"></i>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        function selectRole(card) {
            document.querySelectorAll('.role-card').forEach(c => c.classList.remove('active'));
            card.classList.add('active');
        }

        function handleLogin(e) {
            e.preventDefault();
            const activeRole = document.querySelector('.role-card.active h3').textContent;
            alert('Connexion en tant que: ' + activeRole);
        }
    </script>
</body>
</html>
